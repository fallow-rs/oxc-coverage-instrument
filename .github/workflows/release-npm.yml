name: Release npm

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  DEBUG: napi:*

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            build: npx napi build --release --platform --target aarch64-apple-darwin

          - os: macos-latest
            target: x86_64-apple-darwin
            build: npx napi build --release --platform --target x86_64-apple-darwin

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            build: npx napi build --release --platform --target x86_64-unknown-linux-gnu --use-napi-cross

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            build: npx napi build --release --platform --target aarch64-unknown-linux-gnu --use-napi-cross

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            build: npx napi build --release --platform --target x86_64-unknown-linux-musl -x

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            build: npx napi build --release --platform --target x86_64-pc-windows-msvc

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            build: npx napi build --release --platform --target aarch64-pc-windows-msvc

    steps:
      - name: Configure git long paths (Windows)
        if: contains(matrix.os, 'windows')
        run: git config --system core.longpaths true

      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.target }}-cargo-

      - uses: mlugg/setup-zig@v2
        if: contains(matrix.target, 'musl')
        with:
          version: 0.14.1

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        if: contains(matrix.target, 'musl')
        with:
          tool: cargo-zigbuild

      - name: Install dependencies
        working-directory: napi
        run: npm ci || npm install

      - name: Build native binding
        working-directory: napi
        run: ${{ matrix.build }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          # `napi build` generates the JS/TS wrapper (index.js, index.d.ts) alongside
          # the .node binary. The wrapper embeds the current package.json version and
          # is identical across build targets, so including it here lets the publish
          # job pick one up without running the build again. The wrapper files are
          # gitignored (regenerated on every build) so they must travel via artifacts.
          path: |
            napi/*.node
            napi/index.js
            napi/index.d.ts
          if-no-files-found: error

  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish oxc_coverage_instrument
        run: cargo publish --allow-dirty || echo "Already published, skipping"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    env:
      TAG_REF: ${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Ensure latest npm (for trusted publishing)
        run: npm install -g npm@10.9.8 && npm install -g npm@latest

      - name: Install dependencies
        working-directory: napi
        run: npm ci || npm install

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: napi/artifacts

      - name: Move artifacts into npm dirs
        working-directory: napi
        run: npx napi artifacts --output-dir artifacts

      - name: Restore JS/TS wrapper from build artifacts
        # The JS/TS wrapper files (index.js, index.d.ts) are gitignored because
        # `napi build` regenerates them. They ARE in every `bindings-*` artifact
        # produced by the matrix build. Copy one pair back into napi/ so
        # `npm publish` picks them up per the `files` field in package.json.
        # Without this, the tarball ships without index.js and `require('./index.js')`
        # in vitest.js fails at import time (see issue triggered after v0.3.1).
        working-directory: napi
        run: |
          for dir in artifacts/bindings-*/; do
            if [ -f "$dir/index.js" ] && [ -f "$dir/index.d.ts" ]; then
              cp "$dir/index.js" index.js
              cp "$dir/index.d.ts" index.d.ts
              echo "Restored wrapper from $dir"
              break
            fi
          done
          test -f index.js && test -f index.d.ts

      - name: Update versions from tag
        working-directory: napi
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          for pkg in package.json npm/*/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$pkg', 'utf8'));
              pkg.version = '$VERSION';
              if (pkg.optionalDependencies) {
                for (const key of Object.keys(pkg.optionalDependencies)) {
                  if (key.startsWith('@oxc-coverage-instrument/')) {
                    pkg.optionalDependencies[key] = '$VERSION';
                  }
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      - name: Prepare root package
        working-directory: napi
        run: npx napi pre-publish --no-gh-release -t npm --skip-optional-publish

      - name: Publish platform packages
        working-directory: napi
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          FAILED=0
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              PKG_NAME=$(node -e "console.log(require('./$dir/package.json').name)")
              echo "Publishing $PKG_NAME@$VERSION..."
              if npm view "$PKG_NAME@$VERSION" version >/dev/null 2>&1; then
                echo "  Already published, skipping"
                continue
              fi
              if ! npm publish "$dir" --access public --provenance; then
                echo "  Provenance publish failed, retrying without provenance..."
                if ! npm publish "$dir" --access public; then
                  echo "::error::Failed to publish $PKG_NAME@$VERSION"
                  FAILED=1
                fi
              fi
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Publish root package
        working-directory: napi
        run: |
          VERSION="${TAG_REF#refs/tags/v}"
          if npm view "oxc-coverage-instrument@$VERSION" version >/dev/null 2>&1; then
            echo "oxc-coverage-instrument@$VERSION already published, skipping"
          else
            npm publish --access public --provenance --ignore-scripts || \
              npm publish --access public --ignore-scripts
          fi
